services:
  postgres:
    image: postgres:15-alpine
    container_name: broker_postgres
    restart: always
    environment:
      POSTGRES_USER: user_oleo
      POSTGRES_PASSWORD: password_oleo
      POSTGRES_DB: oleo_db
    ports:
      - "5433:5432"
    volumes:
      - broker_postgres_data:/var/lib/postgresql/data
      - ../db/init.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:7-alpine
    container_name: broker_redis
    restart: always
    ports:
      - "6380:6379"

volumes:
  broker_postgres_data:
